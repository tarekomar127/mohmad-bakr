<app-modal [title]="existing ? 'تعديل الفيديو' : 'إضافة فيديو جديد'" (closed)="close()">
  <form [formGroup]="form" class="space-y-4">
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">عنوان الفيديو</label>
      <input formControlName="title" type="text" class="field-control" placeholder="عنوان الفيديو" />
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">الوصف</label>
      <textarea formControlName="description" rows="3" class="field-control" placeholder="وصف مختصر للفيديو"></textarea>
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">الصورة المصغرة</label>
      <div class="flex items-center gap-4">
        <div class="flex h-16 w-24 shrink-0 items-center justify-center overflow-hidden rounded-xl border border-line bg-page">
          @if (thumbnailPreview()) {
            <img [src]="thumbnailPreview()" alt="" class="h-full w-full object-cover" />
          } @else {
            <span class="text-xs text-ink-muted">لا توجد صورة</span>
          }
        </div>
        <label class="btn-outline cursor-pointer text-xs">
          <svg lucideUpload [size]="14"></svg>
          رفع صورة
          <input type="file" accept="image/*" class="hidden" (change)="onThumbnailSelected($event)" />
        </label>
      </div>
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">المرحلة التعليمية</label>
        <select formControlName="stage" class="field-control">
          <option value="" disabled>اختر المرحلة</option>
          @for (stage of stages; track stage) {
            <option [value]="stage">{{ stageLabels[stage] }}</option>
          }
        </select>
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">اسم الدرس</label>
        <input formControlName="lessonName" type="text" class="field-control" placeholder="مثال: النحو - المبتدأ والخبر" />
      </div>
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">مدة الفيديو (دقيقة)</label>
        <input formControlName="durationMinutes" type="number" min="1" class="field-control" />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">حالة النشر</label>
        <select formControlName="status" class="field-control">
          <option value="published">منشور</option>
          <option value="draft">مسودة</option>
        </select>
      </div>
    </div>
  </form>

  <button footer type="button" (click)="close()" class="btn-outline">إلغاء</button>
  <button footer type="button" (click)="save()" class="btn-primary">حفظ</button>
</app-modal>
