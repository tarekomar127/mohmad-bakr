<app-modal [title]="existing ? 'تعديل الفيديو' : 'إضافة فيديو جديد'" (closed)="close()">
  <form [formGroup]="form" class="space-y-4">
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">عنوان الفيديو</label>
      <input formControlName="title" type="text" class="field-control" placeholder="عنوان الفيديو" />
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">الوصف</label>
      <textarea formControlName="description" rows="3" class="field-control" placeholder="وصف مختصر للفيديو"></textarea>
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">رابط الصورة المصغرة (اختياري)</label>
      <input formControlName="thumbnailUrl" type="text" class="field-control" placeholder="/uploads/thumb.jpg" dir="ltr" />
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">المرحلة</label>
        <select class="field-control" [ngModel]="selectedStageId()" [ngModelOptions]="{ standalone: true }" (ngModelChange)="onStageChange($event)">
          <option value="" disabled>اختر المرحلة</option>
          @for (stage of stages(); track stage.id) {
            <option [value]="stage.id">{{ stage.name }}</option>
          }
        </select>
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">الترم</label>
        <select
          class="field-control"
          [ngModel]="selectedTermId()"
          [ngModelOptions]="{ standalone: true }"
          (ngModelChange)="onTermChange($event)"
          [disabled]="!selectedStageId()"
        >
          <option value="" disabled>اختر الترم</option>
          @for (term of terms(); track term.id) {
            <option [value]="term.id">{{ term.name }}</option>
          }
        </select>
      </div>
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">الوحدة</label>
      <select formControlName="unitId" class="field-control" [disabled]="!selectedTermId()">
        <option value="" disabled>اختر الوحدة</option>
        @for (unit of units(); track unit.id) {
          <option [value]="unit.id">{{ unit.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">رابط فيديو يوتيوب</label>
      <input
        formControlName="youTubeUrl"
        type="url"
        class="field-control"
        dir="ltr"
        placeholder="https://www.youtube.com/watch?v=... أو https://youtu.be/..."
      />
      @if (form.controls.youTubeUrl.invalid && form.controls.youTubeUrl.touched) {
        <p class="mt-1 text-xs text-red-600">رابط يوتيوب غير صحيح</p>
      }
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">رابط شرح إضافي على يوتيوب (اختياري)</label>
      <input
        type="url"
        class="field-control"
        dir="ltr"
        placeholder="https://www.youtube.com/watch?v=..."
        [ngModel]="explainYoutubeUrl()"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="onExplainYoutubeUrlChange($event)"
      />
      <p class="mt-1 text-xs text-ink-muted">هيظهر للطالب كزرار منفصل "مشاهدة شرح على يوتيوب" جنب الفيديو المرفوع.</p>
      @if (explainYoutubeUrlInvalid()) {
        <p class="mt-1 text-xs text-red-600">رابط يوتيوب غير صحيح</p>
      }
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">مدة الفيديو (دقيقة)</label>
        <input formControlName="duration" type="number" min="1" class="field-control" />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">حالة النشر</label>
        <select formControlName="isPublished" class="field-control">
          <option [ngValue]="true">منشور</option>
          <option [ngValue]="false">مسودة</option>
        </select>
      </div>
    </div>
  </form>

  <button footer type="button" (click)="close()" class="btn-outline">إلغاء</button>
  <button footer type="button" (click)="save()" class="btn-primary">حفظ</button>
</app-modal>
