<app-modal [title]="existing ? 'تعديل الملف' : 'رفع ملف PDF جديد'" (closed)="close()">
  <form [formGroup]="form" class="space-y-4">
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">عنوان الملف</label>
      <input formControlName="title" type="text" class="field-control" placeholder="عنوان الملف" />
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">الوصف</label>
      <textarea formControlName="description" rows="3" class="field-control" placeholder="وصف مختصر للملف"></textarea>
    </div>

    <div class="grid gap-4 sm:grid-cols-3">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">المرحلة</label>
        <select class="field-control" [ngModel]="selectedStageId()" [ngModelOptions]="{ standalone: true }" (ngModelChange)="onStageChange($event)">
          <option value="" disabled>اختر المرحلة</option>
          @for (stage of stages(); track stage.id) {
            <option [value]="stage.id">{{ stage.name }}</option>
          }
        </select>
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">الترم</label>
        <select
          class="field-control"
          [ngModel]="selectedTermId()"
          [ngModelOptions]="{ standalone: true }"
          (ngModelChange)="onTermChange($event)"
          [disabled]="!selectedStageId()"
        >
          <option value="" disabled>اختر الترم</option>
          @for (term of terms(); track term.id) {
            <option [value]="term.id">{{ term.name }}</option>
          }
        </select>
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-ink">الوحدة / الدرس</label>
        <select formControlName="lessonId" class="field-control" [disabled]="!selectedTermId()">
          <option value="" disabled>اختر الدرس</option>
          @for (unit of units(); track unit.id) {
            @for (lesson of unit.lessons; track lesson.id) {
              <option [value]="lesson.id">{{ unit.name }} - {{ lesson.name }}</option>
            }
          }
        </select>
      </div>
    </div>

    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">رفع ملف PDF</label>
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-accent text-primary">
          <svg lucideFileText [size]="20"></svg>
        </div>
        <p class="min-w-0 flex-1 truncate text-sm text-ink-muted">
          @if (uploading()) {
            جاري الرفع...
          } @else {
            {{ fileName() || 'لم يتم اختيار ملف بعد' }}
          }
        </p>
        <label class="btn-outline shrink-0 cursor-pointer text-xs">
          <svg lucideUpload [size]="14"></svg>
          اختيار ملف
          <input type="file" accept="application/pdf" class="hidden" (change)="onFileSelected($event)" />
        </label>
      </div>
    </div>
  </form>

  <button footer type="button" (click)="close()" class="btn-outline">إلغاء</button>
  <button footer type="button" (click)="save()" [disabled]="uploading()" class="btn-primary">حفظ</button>
</app-modal>
