<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-2xl font-extrabold text-ink">الإعلانات</h1>
      <p class="mt-1 text-sm text-ink-muted">نشر الإعلانات لجميع الطلاب أو لمرحلة دراسية محددة.</p>
    </div>
    <button type="button" (click)="openAddDialog()" class="btn-primary">
      <svg lucidePlus [size]="16"></svg>
      إعلان جديد
    </button>
  </div>

  @if (announcements().length === 0) {
    <app-empty-state title="لا توجد إعلانات بعد" description="انشر أول إعلان ليصل لطلابك فورًا."></app-empty-state>
  } @else {
    <div class="space-y-3">
      @for (announcement of announcements(); track announcement.id) {
        <div class="flex items-start gap-2">
          <app-announcement-banner class="flex-1" [announcement]="announcement"></app-announcement-banner>
          <button
            type="button"
            (click)="deleteAnnouncement(announcement)"
            class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl border border-line text-ink-muted transition-colors hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-500/10"
            aria-label="حذف"
          >
            <svg lucideTrash2 [size]="16"></svg>
          </button>
        </div>
      }
    </div>
  }
</div>
