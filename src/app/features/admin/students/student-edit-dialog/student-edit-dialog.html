<app-modal title="تعديل بيانات الطالب" (closed)="close()">
  <form [formGroup]="form" class="grid gap-4 sm:grid-cols-2">
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">اسم الطالب</label>
      <input formControlName="fullName" type="text" class="field-control" />
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">اسم ولي الأمر</label>
      <input formControlName="parentName" type="text" class="field-control" />
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">رقم هاتف الطالب</label>
      <input formControlName="studentPhone" type="tel" class="field-control" />
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">رقم هاتف ولي الأمر</label>
      <input formControlName="parentPhone" type="tel" class="field-control" />
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">البريد الإلكتروني</label>
      <input formControlName="email" type="email" class="field-control" dir="ltr" />
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">النوع</label>
      <select formControlName="gender" class="field-control">
        <option [ngValue]="1">ذكر</option>
        <option [ngValue]="2">أنثى</option>
      </select>
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">المرحلة التعليمية</label>
      <select formControlName="educationalStage" class="field-control">
        @for (stage of stages; track stage) {
          <option [ngValue]="stage">{{ stageLabels[stage] }}</option>
        }
      </select>
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">المحافظة</label>
      <select formControlName="governorate" class="field-control">
        @for (gov of governorates; track gov) {
          <option [value]="gov">{{ gov }}</option>
        }
      </select>
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-ink">المدينة / السكن</label>
      <input formControlName="city" type="text" class="field-control" />
    </div>
  </form>

  <button footer type="button" (click)="close()" class="btn-outline">إلغاء</button>
  <button footer type="button" (click)="save()" class="btn-primary">حفظ التعديلات</button>
</app-modal>
