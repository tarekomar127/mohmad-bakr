<app-modal [title]="video.title" (closed)="close()">
  <video
    [src]="videoSrc"
    controls
    controlsList="nodownload noremoteplayback"
    disablePictureInPicture
    (contextmenu)="$event.preventDefault()"
    class="aspect-video w-full rounded-2xl bg-black"
  ></video>
  <p class="mt-4 text-sm leading-7 text-ink-muted">{{ video.description }}</p>

  <button footer type="button" (click)="close()" class="btn-outline">إغلاق</button>
</app-modal>
