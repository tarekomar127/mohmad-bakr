@if (teacher(); as t) {
  <section class="bg-gradient-to-b from-accent/60 to-page py-14 dark:from-accent/10">
    <div class="mx-auto grid max-w-7xl items-center gap-10 px-4 sm:px-6 lg:grid-cols-3 lg:px-8">
      <div class="lg:col-span-1">
        <div class="overflow-hidden rounded-3xl border border-line shadow-[var(--shadow-card-hover)]">
          <img [src]="t.profileImageUrl | mediaUrl" [alt]="t.teacherName" class="h-full w-full object-cover" />
        </div>
      </div>
      <div class="lg:col-span-2">
        <span class="text-xs font-semibold text-primary">نبذة عن المعلم</span>
        <h1 class="mt-2 text-3xl font-extrabold text-ink sm:text-4xl">{{ t.teacherName }}</h1>
        <p class="mt-5 whitespace-pre-line text-sm leading-8 text-ink-muted">{{ t.biography }}</p>
      </div>
    </div>
  </section>

  <section class="mx-auto max-w-7xl px-4 py-14 sm:px-6 lg:px-8">
    <div class="grid gap-8 sm:grid-cols-2">
      <div class="rounded-2xl border border-line bg-surface p-6 shadow-[var(--shadow-card)]">
        <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-accent text-primary">
          <svg lucideGraduationCap [size]="22"></svg>
        </div>
        <h2 class="mt-4 text-base font-bold text-ink">المؤهلات العلمية</h2>
        <p class="mt-3 text-sm leading-7 text-ink-muted">{{ t.qualifications }}</p>
      </div>

      <div class="rounded-2xl border border-line bg-surface p-6 shadow-[var(--shadow-card)]">
        <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-accent text-primary">
          <svg lucideBriefcase [size]="22"></svg>
        </div>
        <h2 class="mt-4 text-base font-bold text-ink">الخبرة</h2>
        <p class="mt-3 text-sm leading-7 text-ink-muted">{{ t.experience }}</p>
      </div>
    </div>
  </section>

  <section class="bg-surface py-14">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="text-center">
        <h2 class="text-2xl font-extrabold text-ink sm:text-3xl">معرض الصور</h2>
      </div>
      <div class="mt-8 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-6">
        @for (src of galleryImages; track src) {
          <div class="aspect-square overflow-hidden rounded-2xl border border-line">
            <img [src]="src" alt="" class="h-full w-full object-cover" />
          </div>
        }
      </div>
    </div>
  </section>
}
