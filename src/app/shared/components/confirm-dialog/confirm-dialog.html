<div class="flex w-full max-w-sm flex-col gap-4 p-6">
  <div class="flex items-center gap-3">
    <div
      class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full"
      [class.bg-accent]="!data.danger"
      [class.text-primary]="!data.danger"
      [class.bg-red-100]="data.danger"
      [class.text-red-600]="data.danger"
    >
      <svg lucideTriangleAlert [size]="20"></svg>
    </div>
    <h2 class="text-base font-bold text-ink">{{ data.title }}</h2>
  </div>

  <p class="text-sm text-ink-muted">{{ data.message }}</p>

  <div class="flex justify-end gap-2">
    <button type="button" class="btn-outline" (click)="cancel()">
      {{ data.cancelText || 'إلغاء' }}
    </button>
    <button
      type="button"
      class="rounded-xl px-5 py-2.5 text-sm font-semibold text-white transition-colors"
      [class.bg-primary]="true"
      [class.hover:bg-primary/90]="true"
      (click)="confirm()"
    >
      {{ data.confirmText || 'تأكيد' }}
    </button>
  </div>
</div>
