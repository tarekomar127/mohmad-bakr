<div
  class="group flex items-center gap-4 rounded-2xl border border-line bg-surface p-5 shadow-[var(--shadow-card)] transition-all duration-300 hover:-translate-y-1 hover:shadow-[var(--shadow-card-hover)]"
>
  <div
    class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-accent text-primary [&_svg]:h-6 [&_svg]:w-6"
  >
    <ng-content></ng-content>
  </div>
  <div class="min-w-0">
    <p class="truncate text-sm text-ink-muted">{{ label() }}</p>
    <p class="text-2xl font-bold text-ink">{{ value() }}</p>
    @if (hint()) {
      <p class="text-xs text-ink-muted">{{ hint() }}</p>
    }
  </div>
</div>
