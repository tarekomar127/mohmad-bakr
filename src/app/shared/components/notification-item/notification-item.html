<div class="flex items-start gap-3 rounded-xl border border-line bg-surface p-4">
  <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-accent text-primary">
    <svg lucideBell [size]="16"></svg>
  </div>
  <div class="min-w-0 flex-1">
    <div class="flex flex-wrap items-center justify-between gap-2">
      <h4 class="text-sm font-semibold text-ink">{{ notification().title }}</h4>
      <span class="whitespace-nowrap text-xs text-ink-muted">{{ notification().createdAt | date: 'short' }}</span>
    </div>
    <p class="mt-1 text-sm text-ink-muted">{{ notification().message }}</p>
  </div>
</div>
